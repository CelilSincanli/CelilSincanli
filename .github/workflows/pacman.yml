name: generate pacman game

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      NODE_OPTIONS: --max-old-space-size=8192
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ---------------------------
      # 1. Checkout repository
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      # ---------------------------
      # 2. Ensure output branch exists
      # ---------------------------
      - name: Ensure output branch exists
        run: |
          git fetch origin

          if git ls-remote --exit-code --heads origin output; then
            echo "output branch exists"
          else
            echo "creating output branch"

            git checkout --orphan output
            git rm -rf .

            git commit --allow-empty -m "init output branch"
            git push origin output

            git checkout main
          fi

      # ---------------------------
      # 3. Generate Pacman SVG
      # ---------------------------
      - name: Generate pacman graph
        uses: DuyetBKU/viz-pacman-github-profile@main
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          theme: react-dark
          music: "false"

      # ---------------------------
      # 4. Deploy to output branch
      # ---------------------------
      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
          force_orphan: true